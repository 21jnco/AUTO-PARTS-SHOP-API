services:
  db:
    image: mysql:8.0
    container_name: auto_parts_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auto_parts_shop
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: .
    container_name: auto_parts_api
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: mysql+pymysql://root:root@db:3306/auto_parts_shop
    ports:
      - "8001:8000"

volumes:
  mysql_data: